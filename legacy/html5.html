<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music | OrbitUBG v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" href="/orbit.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  margin: 0;
}

#main {
  margin-left: 180px;
  padding: 20px;
  transition: margin-left 0.2s ease;
  min-height: 100vh;
  box-sizing: border-box;
}

#sidebar.collapsed ~ #main {
  margin-left: 60px;
}

.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 20px;
  color: #ccc;
  margin-bottom: 30px;
}

.player-box {
  max-width: 700px;
  margin: 0 auto 25px auto;
  background: #1c1c1c;
  border-radius: 18px;
  padding: 20px;
}

.now-playing {
  margin-bottom: 15px;
  font-size: 15px;
  color: #ccc;
}

audio {
  width: 100%;
  height: 48px;
}

.search-box {
  max-width: 700px;
  margin: 0 auto 30px auto;
  background: #1c1c1c;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
}

.search-box i {
  color: #888;
}

.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 15px;
}

#main-content {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 1000px;
  margin: 0 auto;
}

.track-row {
  background: #1c1c1c;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 15px;
  transition: 0.2s;
  flex-wrap: wrap;
}

.track-row:hover {
  background: #222;
  transform: scale(1.01);
}

.track-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.track-cover {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  object-fit: cover;
}

.track-title {
  font-size: 17px;
  font-weight: bold;
}

.track-artist {
  color: #aaa;
  font-size: 14px;
}

.music-btn {
  background: #967BB6;
  border: none;
  color: white;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

  <div class="hero">
  <h1>Music</h1>
  <div class="subtitle">Pick something to play</div>
  </div>

<div class="player-box">
  <div class="now-playing" id="now-playing-info">
    Status: Ready to play.
  </div>

  <audio id="audio-player" controls preload="none"></audio>
</div>

<form id="search-form" class="search-box">
  <i class="fa-solid fa-magnifying-glass"></i>
  <input type="text" id="search-input" placeholder="Search music...">
</form>

<div id="main-content">
  <div style="text-align:center;color:#888;padding:40px;">
    Loading music...
  </div>
</div>

</div>

<script src="jquery-1.6.4.min.js"></script>
<script src="html5.js"></script>
<script src="frame.js"></script>
<script src="script.js"></script>

<script>
document.getElementById("search-input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    document.getElementById("search-form").dispatchEvent(new Event("submit"));
  }
});
</script>

</body>
</html>
