<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music | OrbitUBG v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" href="/orbit.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  margin: 0;
}

#main {
  margin-left: 180px;
  padding: 20px;
  transition: margin-left 0.2s ease;
}

#sidebar.collapsed ~ #main {
  margin-left: 60px;
}

.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 20px;
  color: #ccc;
  margin-bottom: 20px;
}

.player-box {
  max-width: 850px;
  margin: 25px auto;
  background: #1c1c1c;
  border-radius: 16px;
  padding: 16px;
}

.now-playing {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 10px;
}

audio {
  width: 100%;
}

.search-bar {
  width: 100%;
  max-width: 850px;
  margin: 0 auto 25px auto;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1c1c1c;
  padding: 12px 14px;
  border-radius: 12px;
  transition: 0.2s;
}

.search-bar:focus-within {
  background: #222;
  transform: scale(1.01);
}

.search-bar i {
  color: #888;
}

.search-bar input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
}

#main-content {
  max-width: 1000px;
  margin: 0 auto;
}

.empty {
  text-align: center;
  color: #888;
  padding: 40px;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

  <div class="hero">
    <h1>Music</h1>
  </div>

  <div class="player-box">
    <div class="now-playing" id="now-playing-info">Status: Ready</div>
    <audio id="audio-player" controls></audio>
  </div>

  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" placeholder="Search music...">
  </div>

  <div id="main-content">
    <div class="empty">Loading...</div>
  </div>

</div>

<script src="jquery-1.6.4.min.js"></script>
<script src="html5.js"></script>
<script src="frame.js"></script>
<script src="script.js"></script>

<script>
const searchInput = document.getElementById("searchInput");

function runSearch(q){
  if(!q.trim()){
    loadRecentTracks();
    return;
  }
  performSearch(q);
}

searchInput.addEventListener("input", (e) => {
  runSearch(e.target.value);
});

searchInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    runSearch(searchInput.value);
  }
});
</script>

</body>
</html>
