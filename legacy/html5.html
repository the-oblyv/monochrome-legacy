<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music | OrbitUBG v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="/orbit.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    #main {
      margin-left: 180px;
      min-height: 100vh;
      padding: 24px;
      transition: margin-left 0.2s ease;
      box-sizing: border-box;
    }

    #sidebar.collapsed ~ #main {
      margin-left: 60px;
    }

    .music-wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding: 24px;
      border-radius: 18px;
      background: linear-gradient(180deg, #1a1a1a, #141414);
      border: 1px solid #2a2a2a;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      object-fit: cover;
      background: #1f1f1f;
      padding: 10px;
    }

    .hero-text h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .hero-text p {
      margin-top: 10px;
      color: #b8b8b8;
      line-height: 1.6;
      font-size: 16px;
    }

    .v2 {
      color: #967BB6;
    }

    .music-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
    }

    .panel {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-content {
      padding: 18px;
    }

    .player-box {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .album-placeholder {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      background: linear-gradient(135deg, #222, #111);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      color: #967BB6;
      border: 1px solid #2f2f2f;
    }

    #now-playing-info {
      font-size: 15px;
      color: #d0d0d0;
      line-height: 1.5;
    }

    audio {
      width: 100%;
      border-radius: 12px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    #search-input {
      flex: 1;
      background: #101010;
      border: 1px solid #2c2c2c;
      color: white;
      padding: 12px;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
    }

    #search-input:focus {
      border-color: #967BB6;
    }

    #btn-search {
      background: #967BB6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    #btn-search:hover {
      opacity: 0.9;
      transform: scale(1.03);
    }

    #main-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .track-card {
      background: #131313;
      border: 1px solid #262626;
      border-radius: 14px;
      padding: 16px;
      transition: 0.2s;
    }

    .track-card:hover {
      border-color: #967BB6;
      transform: translateY(-2px);
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 40px;
    }

    @media (max-width: 900px) {
      #main {
        margin-left: 0;
        padding: 16px;
      }

      .music-layout {
        grid-template-columns: 1fr;
      }

      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

  <div id="sidebar"></div>

  <div id="main">
    <div class="music-wrapper">

      <section class="hero">
        <img src="/orbit.svg" alt="Orbit Logo" class="logo">

        <div class="hero-text">
          <h1>MUSIC <span class="v2">V2</span></h1>

          <p>
            Stream your music.<br>
            Discover new tracks.<br>
            Stay in Orbit.
          </p>
        </div>
      </section>

      <section class="music-layout">

        <div class="panel">
          <div class="panel-header">
            <i class="fa-solid fa-compact-disc"></i>
            Now Playing
          </div>

          <div class="panel-content">
            <div class="player-box">

              <div class="album-placeholder">
                <i class="fa-solid fa-music"></i>
              </div>

              <div id="now-playing-info">
                Ready to play music.
              </div>

              <audio
                id="audio-player"
                controls
                preload="none"
              >
                Your browser does not support the audio element.
              </audio>

            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <i class="fa-solid fa-magnifying-glass"></i>
            Browse Music
          </div>

          <div class="panel-content">

            <form id="search-form" onsubmit="return false;">
              <div class="search-box">
                <input
                  type="text"
                  id="search-input"
                  placeholder="Search songs, artists, albums..."
                >

                <input
                  type="submit"
                  id="btn-search"
                  value="Search"
                >
              </div>
            </form>

            <div id="main-content">
              <div class="loading">
                <h3>Loading music...</h3>
              </div>
            </div>

          </div>
        </div>

      </section>
    </div>
  </div>

  <script src="frame.js"></script>
  <script src="html5.js"></script>
  <script src="script.js"></script>

</body>
</html>
