<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music | OrbitUBG v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" href="/orbit.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  margin: 0;
}

#main {
  margin-left: 180px;
  padding: 20px;
  transition: margin-left 0.2s ease;
}

#sidebar.collapsed ~ #main {
  margin-left: 60px;
}

.hero {
  text-align: center;
  margin-top: 50px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 20px;
}

.subtitle {
  font-size: 24px;
  margin-bottom: 30px;
  color: #ccc;
}

.logo {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 20px;
  margin-bottom: 20px;
}

.v2 {
  color: #967BB6;
}

.player-box {
  max-width: 800px;
  margin: 30px auto 20px auto;
  background: #1c1c1c;
  border-radius: 16px;
  padding: 18px;
}

.now-playing {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 10px;
}

audio {
  width: 100%;
}

.search-box {
  max-width: 800px;
  margin: 0 auto 30px auto;
  background: #1c1c1c;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  transition: 0.2s;
}

.search-box:focus-within {
  background: #222;
  transform: scale(1.01);
}

.search-box i {
  color: #888;
}

.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 15px;
}

#main-content {
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.track-row {
  background: #1c1c1c;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 15px;
  transition: 0.2s;
  flex-wrap: wrap;
}

.track-row:hover {
  background: #222;
  transform: scale(1.01);
}

.track-left {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.track-cover {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  object-fit: cover;
  background: #000;
}

.track-info {
  min-width: 0;
}

.track-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 3px;
}

.track-artist {
  font-size: 13px;
  color: #aaa;
}

.music-btn {
  background: #967BB6;
  border: none;
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.music-btn:hover {
  background: #a88bc9;
  transform: scale(1.05);
}

.empty {
  text-align: center;
  color: #888;
  padding: 40px;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

  <main class="hero">
    <h1>Music</h1>
  </main>

  <div class="player-box">
    <div class="now-playing" id="now-playing-info">Status: Ready to play.</div>
    <audio id="audio-player" controls preload="none"></audio>
  </div>

  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="search-input" placeholder="Search music...">
  </div>

  <div id="main-content">
    <div class="empty">Loading music...</div>
  </div>

</div>

<script src="jquery-1.6.4.min.js"></script>
<script src="html5.js"></script>
<script src="frame.js"></script>
<script src="script.js"></script>

</body>
</html>
